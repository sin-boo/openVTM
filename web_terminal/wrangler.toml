name = "openvtm-web-terminal"
main = "src/index.ts"
compatibility_date = "2025-07-01"
workers_dev = true

# Create with: npx wrangler kv namespace create SERVERS
# Then paste the id below (preview_id for local `wrangler dev`).
[[kv_namespaces]]
binding = "SERVERS"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"

[vars]
# Override in production via `wrangler secret put BROKER_SECRET`
# Dev default — change before public deploy.
BROKER_SECRET = "change-me"
